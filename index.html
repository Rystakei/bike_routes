<html>
  <head>
    <meta charset="utf-8" />
    <title>Bike Route from Saved Google JSON</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@mapbox/polyline@1.1.1/src/polyline.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.5.1/gpx.min.js"></script>
    <script src="https://unpkg.com/@turf/turf/turf.min.js"></script>
    <style>
      #map {
        height: 80vh;
        width: 100%;
      }
      .route-label {
        background: rgba(255, 255, 255, 0.8);
        padding: 3px 6px;
        border-radius: 4px;
        border: 1px solid #ccc;
        font-weight: bold;
        font-size: 12px;
      }

      #nav-buttons button {
        background: white;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin: 2px;
        padding: 6px 12px;
        font-weight: bold;
        cursor: pointer;
      }
      #completionBox {
        position: absolute;
        bottom: 10px;
        left: 10px;
        z-index: 1000;
        background: white;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 13px;
        font-family: sans-serif;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.4);
      }

      #side-panel {
        position: fixed;
        top: 0;
        right: -420px;
        width: 400px;
        height: 100vh;
        background: white;
        box-shadow: -2px 0 10px rgba(0, 0, 0, 0.3);
        z-index: 2000;
        transition: right 0.3s ease;
        display: flex;
        flex-direction: column;
        font-family: sans-serif;
      }
      #side-panel.open {
        right: 0;
      }
      #side-panel-header {
        padding: 15px;
        background: #2c3e50;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #side-panel-header h2 {
        margin: 0;
        font-size: 18px;
      }
      #side-panel-close {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
      }
      #side-panel-content {
        padding: 15px;
        flex: 1;
        overflow-y: auto;
      }
      #location-info {
        margin-bottom: 15px;
      }
      #location-info h3 {
        margin: 0 0 5px 0;
        font-size: 20px;
        color: #2c3e50;
      }
      #location-info p {
        margin: 0;
        color: #666;
        font-size: 14px;
      }
      #location-description {
        margin: 0 0 15px 0;
        color: #444;
        font-size: 13px;
        line-height: 1.5;
      }
      #train-access {
        background: #e8f4f8;
        border-left: 3px solid #3498db;
        padding: 10px 12px;
        margin-bottom: 15px;
        border-radius: 0 4px 4px 0;
      }
      #train-access .train-label {
        font-weight: bold;
        font-size: 12px;
        color: #3498db;
      }
      #train-access .train-value {
        color: #333;
        font-size: 13px;
        margin-top: 4px;
      }
      #best-access {
        font-size: 12px;
        color: #27ae60;
        font-weight: bold;
        margin-top: 4px;
      }
      #video-container {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        border-radius: 8px;
        background: #000;
      }
      #video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
      }
      #panel-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1999;
        display: none;
      }
      #panel-overlay.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="panel-overlay"></div>
    <div id="side-panel">
      <div id="side-panel-header">
        <h2>Trail Info</h2>
        <button id="side-panel-close">&times;</button>
      </div>
      <div id="side-panel-content">
        <div id="location-info">
          <h3 id="location-name"></h3>
          <p id="location-town"></p>
        </div>
        <div id="video-container">
          <iframe id="video-iframe" allowfullscreen></iframe>
        </div>
        <div id="location-description"></div>
        <div id="train-access">
          <div class="train-label">🚆 Train Access</div>
          <div class="train-value" id="location-train"></div>
          <div class="train-value" id="best-access"></div>
        </div>
      </div>
    </div>
    <div
      id="nav-buttons"
      style="position: absolute; top: 10px; left: 10px; z-index: 1000"
    >
      <button onclick="panToBoston()">📍 Boston</button>
      <button onclick="panToPhilly()">📍 Philly</button>
      <button onclick="panToAlexandria()">📍 Alexandria</button>
    </div>
    <div
      id="completionBox"
      style="
        position: absolute;
        bottom: 10px;
        left: 10px;
        background: white;
        padding: 8px;
        border-radius: 5px;
      "
    >
      <strong>Minuteman Trail</strong><br />
      Completed: <span id="milesDone"></span> mi<br />
      Remaining: <span id="milesLeft"></span> mi<br />
      Total: <span id="totalMiles"></span> mi<br />
      (<span id="percentDone"></span>%)
    </div>
    <script src="map_script.js"></script>
  </body>
</html>
